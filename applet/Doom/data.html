<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DOOM - js-dos</title>
  <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
  <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* Evita selecciones molestas en táctil */
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }
    #dos {
      width: 100%;
      height: 100%;
      touch-action: manipulation; /* Mejora respuesta táctil */
    }
    #fullscreen-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 9999;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      display: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div id="dos"></div>
  <button id="fullscreen-btn">⛶ Pantalla completa</button>

  <script>
    const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || ('ontouchstart' in window);

    if (isMobile) {
      document.getElementById('fullscreen-btn').style.display = 'block';
    }

    document.getElementById('fullscreen-btn').addEventListener('click', () => {
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    });

    Dos(document.getElementById("dos"), {
      url: "./doom.jsdos",
      kiosk: true,
      autoStart: true,
      // ---------- CLAVE PARA MÓVIL ----------
      softKeyboard: isMobile,              // Activa el teclado virtual táctil
      softKeyboardLayout: ["Enter", "Escape", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " ", "Ctrl"],
      softFullscreen: isMobile,            // Muestra botón de pantalla completa
      mouseCapture: !isMobile,             // En móvil no capturar ratón
    });
  </script>
</body>
</html>
